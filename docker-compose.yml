services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: ai-agent-learning-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: learning
      POSTGRES_PASSWORD: learning
      POSTGRES_DB: learning
    ports:
      - "54329:5432"
    volumes:
      - ai-agent-learning-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learning -d learning"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  ai-agent-learning-postgres:
